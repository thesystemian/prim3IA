commands:
  prim:
    sync:
      up: "bash ~/prim3IA/drive-sync/sync-manager.sh up"
      down: "bash ~/prim3IA/drive-sync/sync-manager.sh down"
      both: "bash ~/prim3IA/drive-sync/sync-manager.sh both"
    
    status:
      cmd: "echo 'PRIM Status:'; ps aux | grep prim; df -h ~/prim3IA"
    
    activate:
      cmd: "cd ~/prim3IA && python3 core/orchestrator.py"
    
    logs:
      tail: "tail -f ~/prim3IA/logs/*.log"
